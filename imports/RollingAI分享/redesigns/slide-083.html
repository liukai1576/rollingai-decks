<!-- Growth curve SVG. Three curve milestones (SVG coords, vbox 1320×620):
       P1 = (140, 580)  → slide (60+140, 220+580) = (200, 800)
       P2 = (620, 340)  → slide (60+620, 220+340) = (680, 560)
       P3 = (1100, 100) → slide (60+1100, 220+100) = (1160, 320)
-->
<svg class="r61-curve-svg" viewBox="0 0 1320 620" preserveAspectRatio="none">
  <defs>
    <linearGradient id="r61-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#33D6C0" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#3C7FFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9F6FF1" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="r61-fill" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#33D6C0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3C7FFF" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="r61-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- S-curve from lower-left through P1, P2, P3, ending upper-right.
       Tuned so each milestone lies on the path. -->
  <path d="M 40 600 C 100 600, 140 580, 140 580 S 420 480, 620 340 S 980 180, 1100 100 L 1280 60"
        fill="none" stroke="url(#r61-grad)" stroke-width="4"
        stroke-linecap="round" filter="url(#r61-glow)"/>
  <!-- Soft fill under the curve -->
  <path d="M 40 600 C 100 600, 140 580, 140 580 S 420 480, 620 340 S 980 180, 1100 100 L 1280 60 L 1280 620 L 40 620 Z"
        fill="url(#r61-fill)"/>
  <!-- Subtle baseline -->
  <line x1="40" y1="610" x2="1280" y2="610" stroke="rgba(255,255,255,0.16)" stroke-width="1" stroke-dasharray="4 6"/>
</svg>
