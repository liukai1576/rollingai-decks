<style>

  .slide[data-slide-key='slide-060'] .r40-features {
    margin-top: 40px; list-style: none; display: flex; flex-direction: column; gap: 26px;
    padding: 0;
  }
  .slide[data-slide-key='slide-060'] .r40-feat {
    display: grid; grid-template-columns: 56px 1fr; gap: 22px; align-items: start;
  }
  .slide[data-slide-key='slide-060'] .r40-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.20);

  }
  .slide[data-slide-key='slide-060'] .r40-icon svg {
    width: 26px; height: 26px; stroke: #fff; fill: none;

    font-size: 28px; font-weight: 700; line-height: 1.25;
  }
  .slide[data-slide-key='slide-060'] .r40-feat-desc {
    margin-top: 6px; font-size: 19px; font-weight: 300; line-height: 1.5;
    color: rgba(255,255,255,0.78);
  }
  .slide[data-slide-key='slide-060'] .r40-phones {
    position: relative; height: 760px; margin-top: -10px;
  }
  .slide[data-slide-key='slide-060'] .r40-phone {
    position: absolute; border-radius: 38px; overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.30),

  .slide[data-slide-key='slide-060'] .r40-phone img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .slide[data-slide-key='slide-060'] .r40-phone--a {

  .slide[data-slide-key='slide-060'] .r40-phone--b {
    width: 330px; height: 700px; right: 40px; top: 50px; z-index: 2;
  }
  .slide[data-slide-key='slide-060'] .r40-brand {

  }
  .slide[data-slide-key='slide-060'] .r40-pageno {
    position: absolute; right: 100px; bottom: 56px; font-size: 22px;
    color: rgba(255,255,255,0.6); font-family: 'Helvetica Neue', sans-serif;
  }
</style>
