<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RollingAI · 幻灯片管理</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
<style>
  :root {
    --bg: #0c0f1a;
    --panel: #161a28;
    --panel-2: #1d2235;
    --hairline: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --text-dim: #9ba0b3;
    --text-faint: #5a5f72;
    --accent: #d8225f;
    --accent-2: #6b1bb8;
    --green: #22c55e;
    --orange: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
    font-size: 14px; line-height: 1.5;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 56px 1fr;
    grid-template-areas:
      "top top"
      "side main";
    height: 100vh;
  }
  /* Sidebar tag filters only make sense in the Slides view. Hide on
     Decks / Stories tabs and let the main area span the full width. */
  body.no-sidebar {
    grid-template-columns: 1fr;
    grid-template-areas:
      "top"
      "main";
  }
  body.no-sidebar .sidebar { display: none; }

  /* ---- topbar ---- */
  .topbar {
    grid-area: top;
    display: flex; align-items: center; gap: 24px;
    padding: 0 24px;
    background: linear-gradient(180deg, var(--panel) 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--hairline);
  }
  .topbar h1 { font-size: 16px; font-weight: 700; margin: 0; letter-spacing: 0.04em; }
  .topbar h1 .ai { color: var(--accent); }
  .topbar .tabs { display: flex; gap: 4px; }
  .topbar .tabs button {
    background: transparent; color: var(--text-dim);
    border: 0; padding: 8px 14px; border-radius: 6px;
    cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .topbar .tabs button:hover { background: var(--panel-2); color: var(--text); }
  .topbar .tabs button.active { background: var(--panel-2); color: var(--text); }
  .topbar .search {
    margin-left: auto;
    background: var(--panel-2); border: 1px solid var(--hairline);
    border-radius: 6px; padding: 6px 12px;
    color: var(--text); font-size: 13px; width: 280px;
  }
  .topbar .search:focus { outline: none; border-color: var(--accent); }
  .topbar .stats-pill {
    font-size: 12px; color: var(--text-dim);
    padding: 6px 12px; background: var(--panel-2);
    border-radius: 999px; border: 1px solid var(--hairline);
  }

  /* ---- sidebar ---- */
  .sidebar {
    grid-area: side;
    background: var(--panel);
    border-right: 1px solid var(--hairline);
    padding: 16px 12px;
    overflow-y: auto;
  }
  .sidebar .section { margin-bottom: 20px; }
  .sidebar .section-title {
    font-size: 11px; font-weight: 700; color: var(--text-faint);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin: 0 8px 8px;
  }
  .sidebar .tag-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 5px;
    cursor: pointer; color: var(--text);
  }
  .sidebar .tag-row:hover { background: var(--panel-2); }
  .sidebar .tag-row.active { background: var(--panel-2); color: var(--accent); }
  .sidebar .tag-row .count { color: var(--text-faint); font-size: 12px; }

  /* ---- main ---- */
  .main {
    grid-area: main;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .main h2 {
    font-size: 18px; font-weight: 600; margin: 0 0 16px;
  }

  /* slide table */
  .slide-table { width: 100%; border-collapse: collapse; }
  .slide-table th, .slide-table td {
    text-align: left; padding: 10px 12px;
    border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .slide-table th {
    color: var(--text-dim); font-weight: 600;
    position: sticky; top: 0; background: var(--bg); z-index: 1;
  }
  .slide-table tr:hover { background: var(--panel); cursor: pointer; }
  .slide-table .page-no { color: var(--text-faint); font-variant-numeric: tabular-nums; width: 50px; }
  .slide-table .title-cell { max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slide-table .thumb-cell { width: 96px; padding: 6px 8px; }
  .slide-table .thumb-cell img {
    width: 96px; aspect-ratio: 16/9; object-fit: cover;
    border-radius: 4px; background: #000; display: block;
  }
  .slide-table .thumb-cell .thumb-placeholder {
    width: 96px; aspect-ratio: 16/9; background: var(--panel-2);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 11px;
  }

  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
    border: 1px solid transparent;
  }
  .chip.type-封面 { background: rgba(216,34,95,0.18); color: #ff7ab8; }
  .chip.type-案例 { background: rgba(245,158,11,0.18); color: #fbbf24; }
  .chip.type-方法论 { background: rgba(59,130,246,0.18); color: #93c5fd; }
  .chip.type-公司介绍 { background: rgba(34,197,94,0.18); color: #86efac; }
  .chip.type-数据图表 { background: rgba(168,85,247,0.18); color: #d8b4fe; }
  .chip.type-Section { background: rgba(107,114,128,0.18); color: #d1d5db; }
  .chip.type-结尾 { background: rgba(216,34,95,0.18); color: #ff7ab8; }
  .chip.type-其他 { background: rgba(75,85,99,0.18); color: #9ca3af; }
  .chip.customer { background: rgba(216,34,95,0.10); color: #ff9bc8; border-color: rgba(216,34,95,0.3); }
  .chip.media-视频 { background: rgba(168,85,247,0.18); color: #d8b4fe; }
  .chip.media-图文 { background: rgba(75,85,99,0.18); color: #d1d5db; }
  .chip.media-表格 { background: rgba(59,130,246,0.18); color: #93c5fd; }
  .chip.media-纯文字 { background: rgba(75,85,99,0.18); color: #9ca3af; }
  .chip.free { background: rgba(75,85,99,0.18); color: #9ca3af; }
  .chip.free.needs-review { background: rgba(245,158,11,0.18); color: #fbbf24; }

  /* deck cards (gallery) */
  .deck-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .deck-card {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 12px; overflow: hidden; cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .deck-card:hover { transform: translateY(-2px); border-color: rgba(216,34,95,0.4); }
  /* 16:9 via the padding-top trick — more reliable than aspect-ratio,
     especially when a position:absolute child (the slide-count badge)
     is present. */
  .deck-thumb {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
    overflow: hidden;
  }
  .deck-thumb > img,
  .deck-thumb > iframe,
  .deck-thumb > span {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .deck-thumb > img { object-fit: cover; }
  .deck-thumb > iframe {
    /* Legacy fallback only — we now ship pre-rendered JPGs. */
    width: 250%; height: 250%; inset: 0 auto auto 0;
    transform: scale(0.4); transform-origin: top left;
    border: 0; pointer-events: none;
  }
  .deck-thumb > span {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 13px;
  }
  .deck-card .body { padding: 14px 16px; }
  .deck-card .body h3 { margin: 0 0 4px; font-size: 16px; font-weight: 600; }
  .deck-card .body .meta {
    color: var(--text-dim); font-size: 12px;
    display: flex; gap: 12px;
  }
  .deck-card .body .meta span { display: inline-flex; align-items: center; gap: 4px; }

  /* Story cards: big slide-count badge in the thumb's top-right corner.
     What the user cares about is the length of the story, not which
     deck it came from. */
  .deck-thumb .slide-count-badge {
    position: absolute; top: 8px; right: 8px; z-index: 2;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    color: #fff; padding: 4px 12px; border-radius: 8px;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: baseline; gap: 3px;
    line-height: 1;
    pointer-events: none;
  }
  .deck-thumb .slide-count-badge .n {
    font-size: 36px; font-weight: 800; letter-spacing: -0.02em;
  }
  .deck-thumb .slide-count-badge .unit {
    font-size: 14px; font-weight: 500; opacity: 0.85;
  }

  /* story cards */
  .story-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  .story-card {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 16px; cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .story-card:hover { transform: translateY(-2px); border-color: rgba(216,34,95,0.4); }
  .story-card h3 { margin: 0 0 6px; font-size: 16px; font-weight: 600; }
  .story-card .meta { color: var(--text-dim); font-size: 12px; }
  .story-card .members {
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--hairline);
    color: var(--text-faint); font-size: 12px; line-height: 1.7;
  }

  /* slide detail drawer */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 720px; max-width: 90vw;
    background: var(--panel);
    border-left: 1px solid var(--hairline);
    box-shadow: -8px 0 32px rgba(0,0,0,0.5);
    overflow-y: auto;
    z-index: 100;
    transform: translateX(100%); transition: transform .2s ease;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header {
    position: sticky; top: 0; z-index: 10;
    padding: 16px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--hairline);
    display: flex; align-items: center; gap: 12px;
  }
  .drawer-header .page-no { color: var(--text-faint); font-size: 13px; }
  .drawer-header h3 { margin: 0; font-size: 16px; flex: 1; }
  .drawer-header .close {
    background: transparent; border: 0; color: var(--text-dim);
    cursor: pointer; padding: 6px; border-radius: 4px;
  }
  .drawer-header .close:hover { background: var(--panel-2); color: var(--text); }

  .drawer-body { padding: 20px; }
  .preview-iframe {
    width: 100%; aspect-ratio: 16/9;
    border: 1px solid var(--hairline); border-radius: 8px;
    background: #000;
  }
  .field-row {
    display: grid; grid-template-columns: 100px 1fr;
    align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--hairline);
  }
  .field-row label {
    color: var(--text-dim); font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em;
  }
  .field-row input, .field-row select, .field-row textarea {
    background: var(--panel-2); border: 1px solid var(--hairline);
    color: var(--text); padding: 6px 10px; border-radius: 5px;
    font-family: inherit; font-size: 13px; width: 100%;
  }
  .field-row textarea { min-height: 60px; resize: vertical; }
  .drawer .save-btn {
    margin-top: 16px;
    background: linear-gradient(135deg, var(--accent-2), var(--accent));
    color: #fff; border: 0; padding: 10px 20px;
    border-radius: 6px; font-weight: 600; cursor: pointer;
  }
  .drawer .save-btn:disabled { opacity: 0.5; cursor: default; }
  .drawer .saved-flash {
    margin-left: 12px; color: var(--green); font-size: 12px;
  }
  .stories-in {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--hairline);
  }
  .stories-in .story-link {
    display: inline-block; margin-right: 8px;
    padding: 4px 10px; background: var(--panel-2);
    border-radius: 4px; color: var(--text-dim); font-size: 12px;
    cursor: pointer;
  }
  .stories-in .story-link:hover { color: var(--text); }

  .empty {
    text-align: center; padding: 60px 0; color: var(--text-faint);
  }

  /* Skill cards */
  .skill-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .skill-card {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 14px 16px; cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
    display: flex; flex-direction: column; gap: 8px;
  }
  .skill-card:hover { transform: translateY(-2px); border-color: rgba(216,34,95,0.4); }
  .skill-card-head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .skill-card-head h4 { margin: 0; font-size: 15px; font-weight: 600; }
  .skill-version {
    font-size: 11px; color: var(--text-faint);
    font-variant-numeric: tabular-nums;
  }
  .skill-card-kinds { display: flex; gap: 4px; flex-wrap: wrap; }
  .skill-card-kinds .chip {
    background: rgba(75,85,99,0.18); color: #d1d5db;
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
  }
  .skill-card-kinds .chip-pack {
    background: rgba(168,85,247,0.18); color: #d8b4fe;
  }
  .skill-card-desc {
    margin: 0; color: var(--text-dim); font-size: 12px;
    line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .skill-card-triggers {
    color: var(--text-faint); font-size: 11px; line-height: 1.6;
  }
  .skill-card-triggers .trigger {
    color: var(--text-dim); margin-right: 4px;
  }

  /* Click-to-edit titles (story cards + slide rows) */
  .editable-title {
    cursor: text; border-radius: 4px; padding: 1px 4px;
    margin: 0 -4px; transition: background .12s ease;
  }
  .editable-title:hover {
    background: rgba(255,255,255,0.04);
    box-shadow: inset 0 -1px 0 rgba(255,255,255,0.18);
  }
  .title-edit-input {
    width: 100%; box-sizing: border-box;
    background: var(--panel-2); border: 1px solid var(--accent);
    color: var(--text);
    padding: 4px 8px; border-radius: 4px;
    font: inherit; font-weight: inherit;
  }
  .title-edit-input:focus { outline: none; }

  /* loading */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--text-faint); border-top-color: transparent;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- cart (add-to-deck) ---- */
  .task-dot {
    display: inline-block; width: 7px; height: 7px; margin-left: 5px;
    border-radius: 50%; background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .cart-check { cursor: pointer; width: 15px; height: 15px; accent-color: var(--accent); }
  .check-cell { width: 30px; text-align: center; }

  .cart-bar {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    z-index: 60;
    display: flex; align-items: center; gap: 14px;
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 999px; padding: 9px 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
    font-size: 13px;
  }
  .cart-bar b { color: var(--accent); }
  .cart-bar button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--hairline); border-radius: 999px;
    padding: 5px 14px; cursor: pointer; font-size: 12.5px;
  }
  .cart-bar button:hover { border-color: var(--accent); }
  .cart-bar button.primary { background: var(--accent); color: #10141c; font-weight: 700; border: 0; }
  .cart-bar button.ghost { background: transparent; border: 0; color: var(--text-dim); }

  .cart-panel {
    position: fixed; left: 50%; bottom: 70px; transform: translateX(-50%);
    z-index: 59; width: min(860px, 92vw); max-height: 46vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 12px; padding: 14px 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,.55);
  }
  .cart-panel .item {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 4px; border-bottom: 1px solid var(--hairline);
    font-size: 13px;
  }
  .cart-panel .item:last-child { border-bottom: 0; }
  .cart-panel .item img { width: 88px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
  .cart-panel .item .src { color: var(--text-faint); font-size: 11.5px; }
  .cart-panel .item .rm {
    margin-left: auto; background: transparent; border: 0;
    color: var(--text-dim); cursor: pointer; font-size: 15px;
  }
  .cart-panel .item .rm:hover { color: #ff7878; }

  /* ---- insert-position modal ---- */
  .modal-mask {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(6,8,12,.72); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
  }
  .pos-modal {
    width: min(1080px, 94vw); max-height: 86vh; overflow-y: auto;
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 22px 24px;
  }
  .pos-modal h3 { margin: 0 0 6px; font-size: 16px; }
  .pos-modal .hint { color: var(--text-dim); font-size: 12.5px; margin: 0 0 16px; }
  .filmstrip { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
  .filmstrip .page {
    width: 128px; flex: 0 0 auto; text-align: center;
  }
  .filmstrip .page img, .filmstrip .page .ph {
    width: 100%; aspect-ratio: 16/9; object-fit: cover;
    border-radius: 5px; border: 1px solid var(--hairline);
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 11px;
  }
  .filmstrip .page .pno { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .gap-btn {
    flex: 0 0 auto; width: 26px; height: 72px;
    border-radius: 6px; border: 1px dashed var(--hairline);
    background: transparent; color: var(--text-faint);
    cursor: pointer; font-size: 16px; line-height: 1;
  }
  .gap-btn:hover { border-color: var(--accent); color: var(--accent); }
  .gap-btn.chosen { border: 2px solid var(--accent); color: var(--accent); background: rgba(124,196,255,.08); }
  .pos-modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .pos-modal .actions button {
    border-radius: 8px; padding: 8px 18px; cursor: pointer; font-size: 13px;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--hairline);
  }
  .pos-modal .actions button.primary { background: var(--accent); color: #10141c; font-weight: 700; border: 0; }
  .pos-modal .actions button:disabled { opacity: .45; cursor: not-allowed; }

  /* ---- tasks view ---- */
  .task-card {
    background: var(--panel); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 12px;
    font-size: 13px;
  }
  .task-card .head { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .task-card .status {
    font-size: 11.5px; font-weight: 700; border-radius: 999px; padding: 3px 10px;
  }
  .task-card .status.queued  { background: #3a3f4d; color: #cdd3e0; }
  .task-card .status.running { background: #2b4a6d; color: #9fd0ff; }
  .task-card .status.done    { background: #234a32; color: #7fe0a4; }
  .task-card .status.failed  { background: #5a2733; color: #ff9aa8; }
  .task-card .meta { color: var(--text-dim); font-size: 12px; }
  .task-card pre {
    margin: 10px 0 0; padding: 10px 12px; border-radius: 8px;
    background: #0b0e14; border: 1px solid var(--hairline);
    color: #b9c2d4; font-size: 11.5px; line-height: 1.55;
    max-height: 320px; overflow-y: auto; white-space: pre-wrap;
  }
  .story-cart-btn {
    background: var(--panel-2); border: 1px solid var(--hairline);
    color: var(--text-dim); border-radius: 6px; padding: 3px 10px;
    cursor: pointer; font-size: 12px; margin-top: 6px;
  }
  .story-cart-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body x-data="app()" x-init="boot()" :class="{ 'no-sidebar': view !== 'slides' }">

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <h1>RollingAI · 幻灯片管理</h1>
  <div class="tabs">
    <button :class="{active: view==='decks'}" @click="view='decks'">Deck 列表</button>
    <button :class="{active: view==='slides'}" @click="view='slides'">幻灯片</button>
    <button :class="{active: view==='stories'}" @click="view='stories'">故事</button>
    <button :class="{active: view==='skills'}" @click="view='skills'">技能</button>
    <button :class="{active: view==='tasks'}" @click="view='tasks'">
      任务<span class="task-dot" x-show="hasActiveTask"></span>
    </button>
  </div>
  <input class="search" type="search"
         :placeholder="view==='decks' ? '搜索 Deck（按名称）'
                       : view==='stories' ? '搜索故事（按名称）'
                       : view==='skills' ? '搜索技能（按名称 / 触发词）'
                       : '搜索幻灯片（标题 / 正文 / 标签）'"
         x-model.debounce.300ms="filters.search" @input="refresh()" />
  <span class="stats-pill" x-show="stats">
    <span x-text="stats?.totals?.slides ?? '?'"></span> 张幻灯片 ·
    <span x-text="stats?.totals?.stories ?? '?'"></span> 个故事 ·
    <span x-text="stats?.totals?.needs_review ?? '?'"></span> 待复核
  </span>
</div>

<!-- ===== SIDEBAR FILTERS ===== -->
<aside class="sidebar">
  <div class="section">
    <div class="section-title">类型</div>
    <template x-for="t in stats?.type_tag || []" :key="t.value">
      <div class="tag-row" :class="{active: filters.type_tag===t.value}"
           @click="toggleFilter('type_tag', t.value)">
        <span x-text="t.value"></span>
        <span class="count" x-text="t.count"></span>
      </div>
    </template>
  </div>
  <div class="section">
    <div class="section-title">客户</div>
    <template x-for="t in stats?.customer_tag || []" :key="t.value">
      <div class="tag-row" :class="{active: filters.customer_tag===t.value}"
           @click="toggleFilter('customer_tag', t.value)">
        <span x-text="t.value"></span>
        <span class="count" x-text="t.count"></span>
      </div>
    </template>
  </div>
  <div class="section">
    <div class="section-title">媒体</div>
    <template x-for="t in stats?.media_tag || []" :key="t.value">
      <div class="tag-row" :class="{active: filters.media_tag===t.value}"
           @click="toggleFilter('media_tag', t.value)">
        <span x-text="t.value"></span>
        <span class="count" x-text="t.count"></span>
      </div>
    </template>
  </div>
  <div class="section">
    <div class="section-title">特殊</div>
    <div class="tag-row" :class="{active: filters.needs_review}"
         @click="filters.needs_review = !filters.needs_review || null; refresh()">
      <span>待复核</span>
      <span class="count" x-text="stats?.totals?.needs_review || 0"></span>
    </div>
    <div class="tag-row" @click="resetFilters()">
      <span style="color:var(--accent);">↺ 清除筛选</span>
    </div>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main">

  <!-- Decks view (gallery) -->
  <template x-if="view === 'decks'">
    <div>
      <h2>Deck 列表 · <span x-text="decks.length"></span>
        <span x-show="loading" class="spinner"></span>
      </h2>
      <div class="deck-grid">
        <template x-for="d in decks" :key="d.deck_id">
          <div class="deck-card" @click="drillIntoDeck(d.deck_id)">
            <div class="deck-thumb" :class="{'no-mount': !d.has_mount && !d.cover_thumbnail_path}">
              <template x-if="d.cover_thumbnail_path">
                <img :src="'/' + d.cover_thumbnail_path" loading="lazy" alt="封面缩略图">
              </template>
              <template x-if="!d.cover_thumbnail_path && d.has_mount">
                <iframe :src="'/decks/' + d.deck_id + '/index.html#1'"
                        loading="lazy" title="封面缩略图"></iframe>
              </template>
              <template x-if="!d.cover_thumbnail_path && !d.has_mount">
                <span>未挂载 deck 文件（仅元数据）</span>
              </template>
              <div class="slide-count-badge">
                <span class="n" x-text="d.slide_count"></span>
                <span class="unit">张</span>
              </div>
            </div>
            <div class="body">
              <h3 x-text="d.display_name"></h3>
              <div class="meta">
                <span><span x-text="d.story_count"></span> 个故事</span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Slides view -->
  <template x-if="view === 'slides'">
    <div>
      <h2>
        <template x-if="filters.deck_id">
          <span style="font-size:13px;color:var(--text-dim);font-weight:400;">
            Deck：<span style="color:var(--accent);" x-text="filters.deck_id"></span>
            <button @click="filters.deck_id=null; refresh()"
                    style="background:transparent;border:0;color:var(--text-dim);cursor:pointer;margin-left:4px;">
              ✕
            </button>
            ·
          </span>
        </template>
        幻灯片 · <span x-text="slides.length"></span> 张
        <span x-show="loading" class="spinner"></span>
      </h2>
      <table class="slide-table" x-show="slides.length">
        <thead>
          <tr>
            <th class="check-cell" @click.stop>
              <input type="checkbox" class="cart-check"
                     :checked="slides.length && slides.every(s => inCart(s.id))"
                     @change="toggleAllVisible($event.target.checked)">
            </th>
            <th class="page-no">页</th>
            <th class="thumb-cell">缩略图</th>
            <th>标题</th>
            <th>类型</th>
            <th>细分</th>
            <th>客户</th>
            <th>媒体</th>
            <th>自由标签</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="s in slides" :key="s.id">
            <tr @click="openSlide(s.id)">
              <td class="check-cell" @click.stop>
                <input type="checkbox" class="cart-check"
                       :checked="inCart(s.id)"
                       @change="toggleCart(s)">
              </td>
              <td class="page-no" x-text="s.page_no"></td>
              <td class="thumb-cell">
                <template x-if="s.thumbnail_path">
                  <img :src="'/' + s.thumbnail_path" loading="lazy" alt="">
                </template>
                <template x-if="!s.thumbnail_path">
                  <div class="thumb-placeholder">·</div>
                </template>
              </td>
              <td class="title-cell" @click.stop>
                <template x-if="!(editingKind==='slide' && editingId===s.id)">
                  <span class="editable-title" title="点击编辑"
                        @click.stop="startEditTitle('slide', s)"
                        x-text="s.title"></span>
                </template>
                <template x-if="editingKind==='slide' && editingId===s.id">
                  <input class="title-edit-input" type="text"
                         x-model="editingTitleBuf"
                         x-init="$nextTick(() => { $el.focus(); $el.select(); })"
                         @click.stop
                         @keydown.enter.prevent="commitEditTitle(s)"
                         @keydown.escape.prevent="cancelEditTitle()"
                         @blur="commitEditTitle(s)">
                </template>
              </td>
              <td><span class="chip" :class="'type-' + s.type_tag" x-text="s.type_tag || '·'"></span></td>
              <td x-text="s.subtype_tag || '·'"></td>
              <td>
                <template x-if="s.customer_tag">
                  <span class="chip customer" x-text="s.customer_tag"></span>
                </template>
                <template x-if="!s.customer_tag"><span style="color:var(--text-faint)">·</span></template>
              </td>
              <td><span class="chip" :class="'media-' + s.media_tag" x-text="s.media_tag || '·'"></span></td>
              <td>
                <template x-for="ft in s.free_tags" :key="ft">
                  <span class="chip free" :class="ft" x-text="ft"></span>
                </template>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <div class="empty" x-show="!loading && !slides.length">没有符合筛选条件的幻灯片</div>
    </div>
  </template>

  <!-- Stories view -->
  <template x-if="view === 'stories'">
    <div>
      <h2>故事 · <span x-text="stories.length"></span> 个
        <span x-show="loading" class="spinner"></span>
      </h2>
      <div class="deck-grid">
        <template x-for="st in stories" :key="st.id">
          <div class="deck-card" @click="openStory(st.id)">
            <div class="deck-thumb" :class="{'no-mount': !st.cover_thumbnail_path}">
              <template x-if="st.cover_thumbnail_path">
                <img :src="'/' + st.cover_thumbnail_path" loading="lazy" alt="故事首页缩略图">
              </template>
              <template x-if="!st.cover_thumbnail_path">
                <span>无缩略图</span>
              </template>
              <div class="slide-count-badge">
                <span class="n" x-text="st.slide_count"></span>
                <span class="unit">张</span>
              </div>
            </div>
            <div class="body" @click.stop>
              <template x-if="!(editingKind==='story' && editingId===st.id)">
                <h3 class="editable-title" title="点击编辑"
                    @click.stop="startEditTitle('story', st)"
                    x-text="st.title"></h3>
              </template>
              <template x-if="editingKind==='story' && editingId===st.id">
                <h3 style="margin:0 0 4px;">
                  <input class="title-edit-input" type="text"
                         x-model="editingTitleBuf"
                         x-init="$nextTick(() => { $el.focus(); $el.select(); })"
                         @click.stop
                         @keydown.enter.prevent="commitEditTitle(st)"
                         @keydown.escape.prevent="cancelEditTitle()"
                         @blur="commitEditTitle(st)">
                </h3>
              </template>
              <button class="story-cart-btn" @click.stop="addStoryToCart(st)">
                🛒 整组加入购物车 (<span x-text="st.slide_count"></span> 张)
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- Skills view -->
  <template x-if="view === 'skills'">
    <div>
      <h2>技能 · <span x-text="skills.length"></span> 个
        <span x-show="loading" class="spinner"></span>
      </h2>
      <p style="color:var(--text-dim);font-size:13px;margin:0 0 20px;">
        所有 skill 都在 <code>plugin/skills/</code> 下，按类别分组。
        改 SKILL.md 后刷新即可——字段说明见
        <code>plugin/_spec/skill-md-format.md</code>。
      </p>
      <template x-for="kind in skillsKindOrder" :key="kind">
        <template x-if="(skillsGrouped[kind] || []).length">
          <div style="margin-bottom:32px;">
            <h3 style="font-size:13px;color:var(--text-faint);
                       letter-spacing:0.16em;text-transform:uppercase;
                       margin:0 0 12px;border-bottom:1px solid var(--hairline);
                       padding-bottom:6px;">
              <span x-text="kind"></span>
              <span style="color:var(--text-faint);font-weight:400;
                           text-transform:none;letter-spacing:0;margin-left:8px;"
                    x-text="'(' + (skillsGrouped[kind] || []).length + ')'"></span>
            </h3>
            <div class="skill-grid">
              <template x-for="sk in (skillsGrouped[kind] || [])" :key="sk.id">
                <div class="skill-card" @click="openSkill(sk)">
                  <div class="skill-card-head">
                    <h4 x-text="sk.display_name || sk.name"></h4>
                    <span class="skill-version" x-text="'v' + (sk.version || '?')"></span>
                  </div>
                  <div class="skill-card-slug"
                       style="font-family:monospace;font-size:11px;color:var(--text-faint);
                              margin-top:-2px;margin-bottom:2px;"
                       x-text="sk.name"></div>
                  <div class="skill-card-author"
                       style="font-size:11px;color:var(--text-faint);margin-bottom:6px;"
                       x-text="sk.author ? '作者 · ' + sk.author : '作者 · —'"
                       :style="sk.author ? '' : 'color:#c4456a;'"></div>
                  <div class="skill-card-kinds">
                    <template x-for="k in sk.kind" :key="k">
                      <span class="chip" :class="{ 'chip-pack': sk.produces_layout_pack }"
                            x-text="k"></span>
                    </template>
                  </div>
                  <p class="skill-card-desc" x-text="sk.description.split('\n')[0]"></p>
                  <template x-if="(sk.triggers || []).length">
                    <div class="skill-card-triggers">
                      触发：
                      <template x-for="(t, i) in sk.triggers.slice(0, 3)" :key="i">
                        <span class="trigger" x-text="'「' + t + '」'"></span>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>
      </template>
    </div>
  </template>

  <!-- Tasks view -->
  <template x-if="view === 'tasks'">
    <div>
      <h2>任务 · <span x-text="tasks.length"></span> 条
        <span x-show="loading" class="spinner"></span>
      </h2>
      <p style="color:var(--text-dim);font-size:13px;margin:0 0 20px;">
        购物车「加入 Deck」生成的后台任务。一次只跑一个，跑完自动开始下一个。
      </p>
      <template x-for="t in tasks" :key="t.id">
        <div class="task-card">
          <div class="head" @click="toggleTaskLog(t)">
            <span class="status" :class="t.status" x-text="({queued:'排队中',running:'运行中',done:'完成',failed:'失败'})[t.status] || t.status"></span>
            <b x-text="(t.payload && t.payload.target_deck_id) || t.kind"></b>
            <span class="meta">
              <template x-if="t.payload && t.payload.items">
                <span>
                  插入 <b x-text="t.payload.items.length"></b> 张到第
                  <b x-text="t.payload.after_page"></b> 页之后
                </span>
              </template>
            </span>
            <span class="meta" style="margin-left:auto" x-text="t.created_at"></span>
          </div>
          <template x-if="t.error">
            <div style="color:#ff9aa8;font-size:12px;margin-top:6px;" x-text="t.error"></div>
          </template>
          <template x-if="expandedTask === t.id">
            <pre x-text="taskLog || '（无日志）'"></pre>
          </template>
        </div>
      </template>
      <div class="empty" x-show="!loading && !tasks.length">还没有任务 — 在「幻灯片」勾选几张，点「加入 Deck」试试</div>
    </div>
  </template>
</main>

<!-- ===== Cart bar + panel ===== -->
<template x-if="cart.length && view !== 'tasks'">
  <div>
    <div class="cart-panel" x-show="cartOpen" @click.outside="cartOpen = false">
      <template x-for="(it, i) in cart" :key="it.id">
        <div class="item">
          <span style="color:var(--text-faint);width:18px;text-align:right;" x-text="i+1"></span>
          <template x-if="it.thumbnail_path">
            <img :src="'/' + it.thumbnail_path" loading="lazy" alt="">
          </template>
          <div>
            <div x-text="it.title || it.slide_key"></div>
            <div class="src" x-text="it.deck_id + ' · ' + it.slide_key"></div>
          </div>
          <button class="rm" title="移出" @click="removeFromCart(it.id)">✕</button>
        </div>
      </template>
    </div>
    <div class="cart-bar">
      <span>已选 <b x-text="cart.length"></b> 张</span>
      <button class="ghost" @click="cartOpen = !cartOpen"
              x-text="cartOpen ? '收起' : '查看'"></button>
      <button class="primary" @click="openInsertModal()">加入 Deck →</button>
      <button class="ghost" @click="clearCart()">清空</button>
    </div>
  </div>
</template>

<!-- ===== Insert position modal ===== -->
<template x-if="insertModal.open">
  <div class="modal-mask" @click.self="closeInsertModal()">
    <div class="pos-modal">
      <h3>插入到哪个 Deck、哪一页之后？</h3>
      <p class="hint">
        将插入 <b x-text="cart.length"></b> 张 · 原样拷贝（DOM + 素材），不改风格不加 logo ·
        只有 rolling-deck 壳的 deck 可以作为目标
      </p>
      <div style="margin-bottom:14px;">
        <select x-model="insertModal.targetDeck" @change="loadTargetPages()"
                style="background:var(--panel-2);color:var(--text);border:1px solid var(--hairline);
                       border-radius:8px;padding:8px 12px;font-size:13px;min-width:320px;">
          <option value="" disabled>选择目标 Deck…</option>
          <template x-for="d in rollingTargets" :key="d.deck_id">
            <option :value="d.deck_id"
                    x-text="(d.display_name || d.deck_id) + ' (' + d.slide_count + ' 页)'"></option>
          </template>
        </select>
      </div>
      <template x-if="insertModal.targetDeck && insertModal.pages.length">
        <div class="filmstrip">
          <button class="gap-btn" :class="{chosen: insertModal.afterPage === 0}"
                  title="插入到最前" @click="insertModal.afterPage = 0">+</button>
          <template x-for="p in insertModal.pages" :key="p.id">
            <template x-if="true">
              <div style="display:flex;align-items:center;gap:6px;">
                <div class="page">
                  <template x-if="p.thumbnail_path">
                    <img :src="'/' + p.thumbnail_path" loading="lazy" alt="">
                  </template>
                  <template x-if="!p.thumbnail_path">
                    <div class="ph">无图</div>
                  </template>
                  <div class="pno" x-text="'p' + p.page_no"></div>
                </div>
                <button class="gap-btn" :class="{chosen: insertModal.afterPage === p.page_no}"
                        :title="'插入到第 ' + p.page_no + ' 页之后'"
                        @click="insertModal.afterPage = p.page_no">+</button>
              </div>
            </template>
          </template>
        </div>
      </template>
      <template x-if="insertModal.afterPage !== null">
        <p style="color:var(--accent);font-size:13px;margin:14px 0 0;">
          ✓ 将插入到
          <b x-text="insertModal.afterPage === 0 ? '最前面（第 1 页之前）' : '第 ' + insertModal.afterPage + ' 页之后'"></b>
        </p>
      </template>
      <div class="actions">
        <button @click="closeInsertModal()">取消</button>
        <button class="primary"
                :disabled="!insertModal.targetDeck || insertModal.afterPage === null || insertModal.submitting"
                @click="submitInsert()"
                x-text="insertModal.submitting ? '创建中…' : '创建插入任务'"></button>
      </div>
    </div>
  </div>
</template>

<!-- ===== Skill drawer ===== -->
<div class="drawer" :class="{open: !!skillDetail}">
  <template x-if="skillDetail">
    <div>
      <div class="drawer-header">
        <span class="page-no">🛠</span>
        <h3>
          <span x-text="skillDetail.display_name || skillDetail.name"></span>
          <span style="color:var(--text-faint);font-weight:400;font-size:13px;
                       margin-left:8px;font-family:monospace;"
                x-text="skillDetail.name"></span>
          <span style="color:var(--text-faint);font-weight:400;font-size:13px;
                       margin-left:8px;"
                x-text="'v' + (skillDetail.version || '?')"></span>
        </h3>
        <button class="close" @click="skillDetail = null">✕</button>
      </div>
      <div class="drawer-body">
        <div style="margin-bottom:16px;">
          <template x-for="k in skillDetail.kind" :key="k">
            <span class="chip" x-text="k"></span>
          </template>
        </div>
        <div style="color:var(--text-dim);font-size:13px;
                    background:var(--panel-2);padding:10px 14px;
                    border-radius:6px;margin-bottom:16px;
                    white-space:pre-wrap;"
             x-text="skillDetail.description"></div>

        <template x-if="skillDetail.input">
          <div class="field-row">
            <label>输入</label>
            <span x-text="skillDetail.input"></span>
          </div>
        </template>
        <template x-if="skillDetail.output">
          <div class="field-row">
            <label>输出</label>
            <span x-text="skillDetail.output"></span>
          </div>
        </template>
        <template x-if="(skillDetail.triggers || []).length">
          <div class="field-row">
            <label>触发</label>
            <div>
              <template x-for="(t, i) in skillDetail.triggers" :key="i">
                <div style="margin-bottom:2px;color:var(--text-dim);"
                     x-text="'· ' + t"></div>
              </template>
            </div>
          </div>
        </template>
        <template x-if="skillDetail.invocation">
          <div style="margin-top:16px;">
            <div style="font-size:12px;color:var(--text-dim);font-weight:600;
                        letter-spacing:0.04em;margin-bottom:6px;">命令</div>
            <pre style="background:var(--panel-2);padding:12px 14px;
                        border-radius:6px;font-size:12px;line-height:1.5;
                        color:var(--text);overflow-x:auto;"
                 x-text="skillDetail.invocation"></pre>
          </div>
        </template>
        <template x-if="(skillDetail.requires || []).length">
          <div style="margin-top:16px;">
            <div style="font-size:12px;color:var(--text-dim);font-weight:600;
                        letter-spacing:0.04em;margin-bottom:6px;">前置依赖</div>
            <template x-for="(r, i) in skillDetail.requires" :key="i">
              <div style="color:var(--text-dim);font-size:13px;"
                   x-text="'· ' + r"></div>
            </template>
          </div>
        </template>
        <div style="margin-top:20px;font-size:11px;color:var(--text-faint);">
          源文件：<code x-text="skillDetail.path"></code>
        </div>
      </div>
    </div>
  </template>
</div>

<!-- ===== Story drawer ===== -->
<div class="drawer" :class="{open: !!storyDetail}">
  <template x-if="storyDetail">
    <div>
      <div class="drawer-header">
        <span class="page-no">📚</span>
        <h3 x-text="storyDetail.title"></h3>
        <button class="close" @click="storyDetail = null">✕</button>
      </div>
      <div class="drawer-body">
        <div style="color:var(--text-dim);font-size:12px;margin-bottom:16px;">
          <template x-if="storyDetail.start_page">
            <span>
              来自《<span x-text="storyDetail.deck_display_name || storyDetail.deck_id"></span>》
              第 <span x-text="storyDetail.start_page"></span>–<span x-text="storyDetail.end_page"></span> 页
            </span>
          </template>
        </div>
        <template x-if="storyDetail.description">
          <p style="color:var(--text-dim);font-size:13px;line-height:1.6;
                    background:var(--panel-2);padding:10px 14px;border-radius:6px;
                    margin-bottom:16px;"
             x-text="storyDetail.description"></p>
        </template>

        <h4 style="margin:24px 0 12px;font-size:13px;color:var(--text-dim);
                   letter-spacing:0.08em;">
          包含的幻灯片（<span x-text="storyDetail.slides.length"></span> 张）
        </h4>
        <table class="slide-table" style="font-size:13px;">
          <thead>
            <tr>
              <th style="width:36px;">序号</th>
              <th class="page-no">页</th>
              <th class="thumb-cell">缩略图</th>
              <th>标题</th>
              <th>类型</th>
              <th>客户</th>
              <th>媒体</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(s, i) in storyDetail.slides" :key="s.id">
              <tr @click="storyDetail=null; openSlide(s.id)">
                <td style="color:var(--text-faint);">
                  <span x-text="(s.position ?? i) + 1"></span>
                </td>
                <td class="page-no" x-text="s.page_no"></td>
                <td class="thumb-cell">
                  <template x-if="s.thumbnail_path">
                    <img :src="'/' + s.thumbnail_path" loading="lazy" alt="">
                  </template>
                  <template x-if="!s.thumbnail_path">
                    <div class="thumb-placeholder">·</div>
                  </template>
                </td>
                <td class="title-cell" x-text="s.title"></td>
                <td><span class="chip" :class="'type-' + s.type_tag"
                          x-text="s.type_tag || '·'"></span></td>
                <td>
                  <template x-if="s.customer_tag">
                    <span class="chip customer" x-text="s.customer_tag"></span>
                  </template>
                  <template x-if="!s.customer_tag">
                    <span style="color:var(--text-faint)">·</span>
                  </template>
                </td>
                <td><span class="chip" :class="'media-' + s.media_tag"
                          x-text="s.media_tag || '·'"></span></td>
              </tr>
            </template>
          </tbody>
        </table>

        <div style="margin-top:24px;display:flex;gap:8px;">
          <button class="save-btn" @click="exportStoryDeck(storyDetail.id)"
                  title="把该故事的幻灯片导出为新 Deck（开发中）">
            导出为新 Deck
          </button>
        </div>
      </div>
    </div>
  </template>
</div>

<!-- ===== Slide drawer ===== -->
<div class="drawer" :class="{open: !!detail}">
  <template x-if="detail">
    <div>
      <div class="drawer-header">
        <span class="page-no" x-text="'第 ' + detail.page_no + ' 页'"></span>
        <h3 x-text="detail.title"></h3>
        <button class="close" @click="detail = null">✕</button>
      </div>
      <div class="drawer-body">
        <iframe class="preview-iframe"
                :src="'/decks/' + detail.deck_id + '/index.html#' + detail.page_no"
                title="幻灯片预览"></iframe>

        <h4 style="margin-top:24px;margin-bottom:8px;">标签</h4>
        <div class="field-row">
          <label>标题</label>
          <input type="text" x-model="editBuf.title" />
        </div>
        <div class="field-row">
          <label>类型</label>
          <select x-model="editBuf.type_tag">
            <option value="">·</option>
            <option>公司介绍</option><option>案例</option>
            <option>方法论</option><option>Section</option>
            <option>结尾</option>
          </select>
        </div>
        <div class="field-row">
          <label>细分</label>
          <input type="text" x-model="editBuf.subtype_tag" />
        </div>
        <div class="field-row">
          <label>客户</label>
          <input type="text" x-model="editBuf.customer_tag" />
        </div>
        <div class="field-row">
          <label>媒体</label>
          <select x-model="editBuf.media_tag">
            <option value="">·</option>
            <option>图文</option><option>视频</option><option>表格</option><option>纯文字</option>
          </select>
        </div>
        <div class="field-row">
          <label>自由标签</label>
          <input type="text" x-model="editBuf.free_tags_str"
                 placeholder="逗号分隔，例如：金句页, 内部使用" />
        </div>
        <div class="field-row">
          <label>备注</label>
          <textarea x-model="editBuf.notes" placeholder="编辑批注 / 上下文"></textarea>
        </div>

        <button class="save-btn" @click="saveSlide()" :disabled="saving">
          <span x-show="!saving">保存</span>
          <span x-show="saving">保存中…</span>
        </button>
        <span class="saved-flash" x-show="savedFlash">✓ 已保存</span>

        <div class="stories-in" x-show="detail.stories?.length">
          <div style="color:var(--text-dim);font-size:12px;margin-bottom:6px;">
            出现在以下故事中（点击跳转）：
          </div>
          <template x-for="st in detail.stories" :key="st.id">
            <span class="story-link" @click="detail=null; view='stories'; openStory(st.id)">
              <span x-text="st.title"></span>
              <span style="color:var(--text-faint);">· 第 <span x-text="st.position + 1"></span> 张</span>
            </span>
          </template>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function app() {
  return {
    view: 'decks',
    stats: null,
    decks: [],
    slides: [],
    stories: [],
    detail: null,           // slide detail
    storyDetail: null,      // story detail
    skills: [],
    skillsGrouped: {},
    skillsKindOrder: ['构思', '创建', '布局风格', '调整', '管理分析'],
    skillDetail: null,      // skill detail (drawer)
    editBuf: {},
    // Click-to-edit (story title in card, slide title in row).
    // editingId is the row/card id being edited; null means none.
    editingKind: null,      // 'story' | 'slide' | null
    editingId: null,
    editingTitleBuf: '',
    loading: false,
    saving: false,
    savedFlash: false,
    filters: {
      deck_id: null,
      type_tag: null, customer_tag: null, media_tag: null,
      needs_review: null, search: '',
    },
    // ---- cart (add-to-deck) ----
    cart: JSON.parse(localStorage.getItem('deck-cart') || '[]'),
    cartOpen: false,
    insertModal: {
      open: false, targetDeck: '', pages: [],
      afterPage: null, submitting: false,
    },
    rollingTargets: [],     // decks usable as insert targets
    // ---- tasks ----
    tasks: [],
    expandedTask: null,
    taskLog: '',
    hasActiveTask: false,
    _taskTimer: null,

    async boot() {
      await this.loadStats();
      await this.refresh();
      this.$watch('view', () => this.refresh());
      // Light poll for the topbar task indicator (even outside the tasks tab).
      const ping = async () => {
        try {
          const r = await fetch('/api/tasks?limit=5');
          const d = await r.json();
          this.hasActiveTask = (d.tasks || []).some(
            t => t.status === 'queued' || t.status === 'running');
        } catch { /* server restarting — ignore */ }
        setTimeout(ping, this.hasActiveTask ? 3000 : 15000);
      };
      ping();
    },

    async loadStats() {
      const r = await fetch('/api/stats');
      this.stats = await r.json();
    },

    async refresh() {
      this.loading = true;
      if (this.view === 'slides')       await this.loadSlides();
      else if (this.view === 'stories') await this.loadStories();
      else if (this.view === 'decks')   await this.loadDecks();
      else if (this.view === 'skills')  await this.loadSkills();
      else if (this.view === 'tasks')   await this.loadTasks();
      this.loading = false;
    },

    async loadDecks() {
      const params = new URLSearchParams();
      if (this.filters.search) params.set('search', this.filters.search);
      const r = await fetch('/api/decks?' + params);
      const d = await r.json();
      this.decks = d.decks;
    },

    drillIntoDeck(deckId) {
      this.filters.deck_id = deckId;
      this.view = 'slides';
    },

    async loadSlides() {
      const params = new URLSearchParams();
      for (const [k, v] of Object.entries(this.filters)) {
        if (v) params.set(k, v);
      }
      const r = await fetch('/api/slides?' + params);
      const d = await r.json();
      this.slides = d.slides;
    },

    async loadStories() {
      const params = new URLSearchParams();
      if (this.filters.search) params.set('search', this.filters.search);
      const r = await fetch('/api/stories?' + params);
      const d = await r.json();
      this.stories = d.stories;
    },

    async loadSkills() {
      const r = await fetch('/api/skills');
      const d = await r.json();
      let skills = d.skills || [];
      // Client-side search across name + triggers (server-side keeps
      // /api/skills simple — the list is tiny so this is fine).
      const q = (this.filters.search || '').trim().toLowerCase();
      if (q) {
        skills = skills.filter(s =>
          (s.name || '').toLowerCase().includes(q)
          || (s.id || '').toLowerCase().includes(q)
          || (s.description || '').toLowerCase().includes(q)
          || (s.triggers || []).some(t => t.toLowerCase().includes(q))
        );
      }
      this.skills = skills;
      // Re-group on the client so search filters carry over.
      const grouped = {};
      for (const s of skills) {
        for (const k of (s.kind && s.kind.length ? s.kind : ['其他'])) {
          (grouped[k] = grouped[k] || []).push(s);
        }
      }
      this.skillsGrouped = grouped;
    },

    openSkill(sk) {
      this.skillDetail = sk;
      this.$nextTick(() => {
        document.querySelectorAll('.drawer').forEach(d => d.scrollTop = 0);
      });
    },

    toggleFilter(k, v) {
      this.filters[k] = this.filters[k] === v ? null : v;
      this.refresh();
    },

    resetFilters() {
      this.filters = {
        deck_id: null,
        type_tag: null, customer_tag: null, media_tag: null,
        needs_review: null, search: '',
      };
      this.refresh();
    },

    async openSlide(id) {
      const r = await fetch('/api/slides/' + id);
      this.detail = await r.json();
      this.editBuf = {
        title: this.detail.title,
        type_tag: this.detail.type_tag || '',
        subtype_tag: this.detail.subtype_tag || '',
        customer_tag: this.detail.customer_tag || '',
        media_tag: this.detail.media_tag || '',
        free_tags_str: (this.detail.free_tags || []).join(', '),
        notes: this.detail.notes || '',
      };
      // Reset drawer scroll position so the header is visible on every open.
      // Without this the drawer keeps the scroll from the previous slide and
      // the close button + iframe may be scrolled out of view.
      this.$nextTick(() => {
        const d = document.querySelector('.drawer');
        if (d) d.scrollTop = 0;
      });
    },

    async openStory(id) {
      const r = await fetch('/api/stories/' + id);
      this.storyDetail = await r.json();
      this.$nextTick(() => {
        const drawers = document.querySelectorAll('.drawer');
        drawers.forEach(d => d.scrollTop = 0);
      });
    },

    async exportStoryDeck(storyId) {
      const r = await fetch('/api/stories/' + storyId + '/export-deck',
                             { method: 'POST' });
      const d = await r.json();
      alert('TODO（后端 stub）：\n\n' +
            '会把这个 story 的 ' + d.deck_json_preview.slides.length +
            ' 张 slide 拼成新 deck.json，调用 render-deck.py 出 HTML。\n\n' +
            '现在只返回了 deck.json scaffold，没实际渲染。');
    },

    // ---- Inline title editing ----
    startEditTitle(kind, item) {
      this.editingKind = kind;
      this.editingId = item.id;
      this.editingTitleBuf = item.title || '';
    },
    cancelEditTitle() {
      this.editingKind = null;
      this.editingId = null;
      this.editingTitleBuf = '';
    },
    async commitEditTitle(item) {
      // Guard against double-fire (Enter then blur).
      if (this.editingId !== item.id) return;
      const newTitle = (this.editingTitleBuf || '').trim();
      const kind = this.editingKind;
      this.editingKind = null;
      this.editingId = null;
      if (!newTitle || newTitle === item.title) return;
      const url = kind === 'story'
        ? '/api/stories/' + item.id
        : '/api/slides/' + item.id;
      const r = await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle }),
      });
      if (r.ok) {
        item.title = newTitle;
      } else {
        alert('保存失败：' + r.status);
      }
    },

    // ---- Cart (add-to-deck) ----
    _saveCart() {
      localStorage.setItem('deck-cart', JSON.stringify(this.cart));
    },
    inCart(id) { return this.cart.some(it => it.id === id); },
    toggleCart(s) {
      if (this.inCart(s.id)) {
        this.cart = this.cart.filter(it => it.id !== s.id);
      } else {
        this.cart.push({
          id: s.id, deck_id: s.deck_id, slide_key: s.slide_key,
          title: s.title, thumbnail_path: s.thumbnail_path,
        });
      }
      this._saveCart();
    },
    toggleAllVisible(checked) {
      if (checked) {
        for (const s of this.slides) {
          if (!this.inCart(s.id)) this.toggleCart(s);
        }
      } else {
        const visible = new Set(this.slides.map(s => s.id));
        this.cart = this.cart.filter(it => !visible.has(it.id));
        this._saveCart();
      }
    },
    removeFromCart(id) {
      this.cart = this.cart.filter(it => it.id !== id);
      this._saveCart();
      if (!this.cart.length) this.cartOpen = false;
    },
    clearCart() {
      this.cart = [];
      this.cartOpen = false;
      this._saveCart();
    },
    async addStoryToCart(st) {
      // Expand the story into its member slides (page-order) and add each.
      const r = await fetch('/api/stories/' + st.id);
      if (!r.ok) { alert('读取故事失败：' + r.status); return; }
      const d = await r.json();
      let added = 0;
      for (const s of (d.slides || [])) {
        if (!this.inCart(s.id)) {
          this.cart.push({
            id: s.id, deck_id: s.deck_id, slide_key: s.slide_key,
            title: s.title, thumbnail_path: s.thumbnail_path,
          });
          added++;
        }
      }
      this._saveCart();
      this.cartOpen = true;
    },

    // ---- Insert modal ----
    async openInsertModal() {
      // Refresh target list: only mounted rolling-deck hosts qualify.
      const r = await fetch('/api/decks');
      const d = await r.json();
      this.rollingTargets = (d.decks || []).filter(x => x.is_rolling_target);
      if (!this.rollingTargets.length) {
        alert('没有可用的目标 Deck（需要 rolling-deck 壳且已挂载）');
        return;
      }
      this.insertModal = {
        open: true, targetDeck: '', pages: [],
        afterPage: null, submitting: false,
      };
    },
    closeInsertModal() { this.insertModal.open = false; },
    async loadTargetPages() {
      this.insertModal.afterPage = null;
      this.insertModal.pages = [];
      if (!this.insertModal.targetDeck) return;
      const params = new URLSearchParams({
        deck_id: this.insertModal.targetDeck, limit: '2000',
      });
      const r = await fetch('/api/slides?' + params);
      const d = await r.json();
      this.insertModal.pages = (d.slides || [])
        .slice()
        .sort((a, b) => a.page_no - b.page_no);
    },
    async submitInsert() {
      const m = this.insertModal;
      if (!m.targetDeck || m.afterPage === null) return;
      m.submitting = true;
      const body = {
        after_page: m.afterPage,
        items: this.cart.map(it => ({
          source_deck_id: it.deck_id,
          source_slide_key: it.slide_key,
        })),
      };
      const r = await fetch(
        '/api/decks/' + encodeURIComponent(m.targetDeck) + '/insert-slides', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      m.submitting = false;
      if (!r.ok) {
        const e = await r.json().catch(() => ({}));
        alert('创建任务失败：' + (e.detail || r.status));
        return;
      }
      this.clearCart();
      this.closeInsertModal();
      this.view = 'tasks';
    },

    // ---- Tasks ----
    async loadTasks() {
      const r = await fetch('/api/tasks');
      const d = await r.json();
      this.tasks = d.tasks || [];
      this.hasActiveTask = this.tasks.some(
        t => t.status === 'queued' || t.status === 'running');
      // Refresh the expanded task's log while it runs.
      if (this.expandedTask) {
        const cur = this.tasks.find(t => t.id === this.expandedTask);
        if (cur) await this._fetchTaskLog(this.expandedTask);
      }
      // Poll while anything is active (or while watching the tasks view).
      clearTimeout(this._taskTimer);
      if (this.hasActiveTask && this.view === 'tasks') {
        this._taskTimer = setTimeout(() => this.loadTasks(), 3000);
      }
    },
    async _fetchTaskLog(id) {
      const r = await fetch('/api/tasks/' + id);
      if (r.ok) {
        const d = await r.json();
        this.taskLog = d.log || '';
      }
    },
    async toggleTaskLog(t) {
      if (this.expandedTask === t.id) {
        this.expandedTask = null;
        this.taskLog = '';
        return;
      }
      this.expandedTask = t.id;
      this.taskLog = '加载中…';
      await this._fetchTaskLog(t.id);
    },

    async saveSlide() {
      this.saving = true;
      const body = {
        title: this.editBuf.title,
        type_tag: this.editBuf.type_tag || null,
        subtype_tag: this.editBuf.subtype_tag || null,
        customer_tag: this.editBuf.customer_tag || null,
        media_tag: this.editBuf.media_tag || null,
        free_tags: this.editBuf.free_tags_str
          .split(',').map(s => s.trim()).filter(Boolean),
        notes: this.editBuf.notes || null,
      };
      await fetch('/api/slides/' + this.detail.id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      this.saving = false;
      this.savedFlash = true;
      setTimeout(() => this.savedFlash = false, 2000);
      await this.loadStats();
      await this.loadSlides();
    },
  };
}
</script>
</body>
</html>
