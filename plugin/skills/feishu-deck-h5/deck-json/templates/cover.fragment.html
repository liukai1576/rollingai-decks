    <div class="slide-frame">
      <div class="slide" data-layout="cover" {{{ data_attrs }}} data-screen-label="{{ screen_label }}" data-slide-key="{{ slide_key }}">
        <div class="wordmark">飞书</div>
        <div class="stage">
          <h1 class="title title-zh" data-text-id="slide-{{ slide_no_padded }}.title">{{ title }}</h1>
{{{ subtitle_html }}}
        </div>
        <div class="author">
          <span data-text-id="slide-{{ slide_no_padded }}.author">{{ author }}</span><br>
          <span data-text-id="slide-{{ slide_no_padded }}.date">{{ date }}</span>
        </div>
      </div>
    </div>
