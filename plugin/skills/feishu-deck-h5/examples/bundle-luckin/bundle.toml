# multi-case-bundle · 飞书企业 AI 客户案例集 demo
#
# Render with:
#   python3 ../../assets/render.py multi-case-bundle bundle.toml runs/<ts>/output/
#
# Composes a full deck:
#   01 cover · 02 agenda · 03..(N+2) one-pager cases · (N+3) end
#
# Each case below is a path to an existing one-pager input.toml — composes
# the same .story-case fragment used by single-pattern renders.

[deck]
title  = "客户案例集 · 2026 Q1"
author = "飞书企业 AI · 故事栏"
date   = "2026.05.03"

[agenda]
title = "本期共 1 个案例"

[brand]
line    = "飞书企业 AI · 客户案例集"
contact = "contact@feishu.cn  ·  feishu.cn"

# Each case = path to an existing one-pager TOML.
# The label is the short version shown in the agenda;
# the case TOML's full title is shown on its own slide.
[[cases]]
input = "../one-pager-luckin/input.toml"
label = "瑞幸营建 · 萃取隐形经验"
