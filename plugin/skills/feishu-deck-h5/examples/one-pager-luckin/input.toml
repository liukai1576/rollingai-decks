# 一页纸案例 · 瑞幸营建 · 萃取隐形经验
#
# Render with:
#   python3 ../../assets/render.py one-pager input.toml ../../../runs/<ts>/output/
#
# Required fields are documented in assets/render.py ONE_PAGER_REQUIRED.

title    = "瑞幸营建 · 萃取隐形经验避免新店返工"
industry = "连锁零售 · 新店筹建 · 客户案例"
brand    = "飞书企业 AI · 客户案例 · STORY 001"
source   = "数据来源 · 瑞幸营建团队访谈 · 飞书企业 AI 知识库内部口径"

# Hook (the one-line story trailer). Split into lead / accent / tail
# so the accent word can be highlighted teal in the rendered output.
[hook]
lead   = "新店垃圾桶距出餐窄 1 米,按 SOP 必须 "
accent = "砸墙返工"
tail   = " —— 老专家随手两招就解决。"

# Story arc — 4 narrative beats:
#   pain (blue)  · conflict (orange) · solution (teal) · value (violet)
[arc]
pain     = "连锁零售新店筹建,大量老专家经验不在 SOP,新人犯错返工成本高、耽误开店周期。"
conflict = "瑞幸新店验收发现垃圾桶位置距出餐区窄了 1 米,按标准 SOP 必须砸墙返工。"
solution = "几十年经验的营建老专家随手两招:装玻璃隔离 / 换踩弹式自动关闭垃圾桶 —— 不动装修就能合规。"

# Value gets a teal accent inside it (same lead/accent/tail pattern as hook).
[arc.value]
lead   = "飞书把这种不在手册里的隐形经验萃取到 "
accent = "企业 AI 知识库"
tail   = ",新人遇到问题直接搜就能得到解法 —— 老专家脑子里的资产,变成全组织可复用的能力。"

# Scene illustration — path is relative to this TOML file.
[scene]
image    = "./scene.png"
caption  = "现场 · 营建老专家拆解 SOP 之外的隐形经验"
alt      = "瑞幸新店验收现场:营建老专家指着垃圾桶向新人讲解不动装修的解法"
# Optional: scene.fit (cover|contain, default cover) and scene.position
# (default center) — uncomment to override the default cover-crop.
# fit      = "cover"
# position = "center"
