    <div class="slide-frame">
      <div class="slide" data-layout="content-before-after" {{{ data_attrs }}} data-screen-label="{{ screen_label }}" data-slide-key="{{ slide_key }}">
        <div class="wordmark">飞书</div>
        <div class="header">
          <h2 class="title-zh" data-text-id="slide-{{ slide_no_padded }}.title">{{ title }}</h2>
        </div>
        <div class="stage">
          <div class="side before">
            <span class="tag" data-text-id="slide-{{ slide_no_padded }}.before.tag">{{ before.tag }}</span>
            <ul>
{{{ before_items_html }}}
            </ul>
          </div>
          <div class="pivot">
            <div class="arrow">→</div>
{{{ pivot_caption_html }}}
          </div>
          <div class="side after">
            <span class="tag" data-text-id="slide-{{ slide_no_padded }}.after.tag">{{ after.tag }}</span>
            <ul>
{{{ after_items_html }}}
            </ul>
          </div>
        </div>
      </div>
    </div>
