    <div class="slide-frame">
      <div class="slide story-case" data-layout="content-2col" {{{ data_attrs }}} data-screen-label="{{ screen_label }}" data-slide-key="{{ slide_key }}">
        <div class="wordmark">飞书</div>
        <div class="header">
          <h2 class="title-zh" data-text-id="slide-{{ slide_no_padded }}.title">{{ title }}</h2>
        </div>
        <div class="stage">
          <div class="grid">
            <div class="col-text">
              <span class="industry-tag" data-text-id="slide-{{ slide_no_padded }}.industry">{{ industry }}</span>
              <p class="story-hook"><span data-text-id="slide-{{ slide_no_padded }}.hook.lead">{{ hook.lead }}</span><span class="accent" data-text-id="slide-{{ slide_no_padded }}.hook.accent">{{ hook.accent }}</span><span data-text-id="slide-{{ slide_no_padded }}.hook.tail">{{ hook.tail }}</span></p>
              <div class="story-arc">
                <div class="row"><span class="lbl">痛点</span><p data-text-id="slide-{{ slide_no_padded }}.arc.pain">{{ arc.pain }}</p></div>
                <div class="row"><span class="lbl is-orange">冲突</span><p data-text-id="slide-{{ slide_no_padded }}.arc.conflict">{{ arc.conflict }}</p></div>
                <div class="row"><span class="lbl is-teal">解法</span><p data-text-id="slide-{{ slide_no_padded }}.arc.solution">{{ arc.solution }}</p></div>
                <div class="row"><span class="lbl is-violet">价值</span><p><span data-text-id="slide-{{ slide_no_padded }}.arc.value.lead">{{ arc.value.lead }}</span><span class="accent" data-text-id="slide-{{ slide_no_padded }}.arc.value.accent">{{ arc.value.accent }}</span><span data-text-id="slide-{{ slide_no_padded }}.arc.value.tail">{{ arc.value.tail }}</span></p></div>
              </div>
            </div>
            <div class="col-visual">
{{{ scene_html }}}
            </div>
          </div>
        </div>
      </div>
    </div>
