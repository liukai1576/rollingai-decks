    <div class="slide-frame">
      <div class="slide" data-layout="quote" {{{ data_attrs }}} data-screen-label="{{ screen_label }}" data-slide-key="{{ slide_key }}">
        <div class="wordmark">飞书</div>
        <div class="stack">
          <hr class="keyline">
          <blockquote><span data-text-id="slide-{{ slide_no_padded }}.quote.lead">{{ quote.lead }}</span><span class="accent-text" data-text-id="slide-{{ slide_no_padded }}.quote.accent">{{ quote.accent }}</span><span data-text-id="slide-{{ slide_no_padded }}.quote.tail">{{ quote.tail }}</span></blockquote>
          <div class="attrib" data-text-id="slide-{{ slide_no_padded }}.attribution">{{ attribution }}</div>
        </div>
      </div>
    </div>
