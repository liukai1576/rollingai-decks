# quote pattern · 客户原话单页
#
# Render with:
#   python3 ../../assets/render.py quote input.toml runs/<ts>/output/

title       = "瑞幸营建 · 客户原话"
attribution = "瑞幸咖啡 · 营建团队负责人 · 2026"

# Optional defaults: pageno = "01", decor = "blue-glow"
# NOTE 2026-05-20: `brand` field removed — footer chrome retired 2026-05,
# the field is not consumed by quote.html template. See deck-json/MIGRATION-REPORT.md.

# The quote — split into lead / accent / tail so the accent phrase
# is highlighted in teal in the rendered output.
[quote]
lead   = "老专家脑子里的经验,以前只能口口相传。现在飞书把它"
accent = "萃取成 AI 知识库"
tail   = ",新人遇到问题直接搜就有解法。"
