<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{ title }} · 飞书企业 AI</title>
  <link rel="stylesheet" href="{{ asset_path }}/feishu-deck.css">
  <link rel="stylesheet" href="{{ asset_path }}/feishu-deck-patterns.css">
  <link rel="stylesheet" href="{{ asset_path }}/edit-mode/deck-edit-mode.css">
  <style>
    /* Defensive R48 re-assertions — validator audits each <style> block
       independently. No-op visually. */
    .slide[data-layout="content-3up"] .grid { align-content: center; }
    .slide[data-layout="content-2col"] .grid { align-content: center; }
    .slide[data-layout="stats"] .grid { align-content: center; }
    .slide[data-layout="agenda"] .toc { align-content: center; }
    .slide[data-layout="big-stat"] .stage { align-items: center; }
    .slide[data-layout="quote"] .stack { justify-content: center; }
  </style>
</head>
<body class="deck-edit-mode">
  <div class="deck">
    <div class="slide-frame">
      <div class="slide story-case" data-layout="content-2col" data-accent="blue" data-decor="blue-glow"
           data-screen-label="01 {{ screen_label }}">
        <div class="wordmark"></div>
        <div class="header">
          <h2 class="title-zh" data-text-id="slide-01.title">{{ title }}</h2>
        </div>
        <div class="stage">
          <div class="grid">
            <div class="col-text">
              <span class="industry-tag" data-text-id="slide-01.industry">{{ industry }}</span>

              <p class="story-hook">
                <span data-text-id="slide-01.hook.lead">{{ hook.lead }}</span><span class="accent" data-text-id="slide-01.hook.accent">{{ hook.accent }}</span><span data-text-id="slide-01.hook.tail">{{ hook.tail }}</span>
              </p>

              <div class="story-arc">
                <div class="row">
                  <span class="lbl">痛点</span>
                  <p data-text-id="slide-01.arc.pain">{{ arc.pain }}</p>
                </div>
                <div class="row">
                  <span class="lbl is-orange">冲突</span>
                  <p data-text-id="slide-01.arc.conflict">{{ arc.conflict }}</p>
                </div>
                <div class="row">
                  <span class="lbl is-teal">解法</span>
                  <p data-text-id="slide-01.arc.solution">{{ arc.solution }}</p>
                </div>
                <div class="row">
                  <span class="lbl is-violet">价值</span>
                  <p>
                    <span data-text-id="slide-01.arc.value.lead">{{ arc.value.lead }}</span><span class="accent" data-text-id="slide-01.arc.value.accent">{{ arc.value.accent }}</span><span data-text-id="slide-01.arc.value.tail">{{ arc.value.tail }}</span>
                  </p>
                </div>
              </div>
            </div>

            <div class="col-visual">
              <div class="scene-frame" role="img" aria-label="{{ scene.alt }}"
                   style="background-image: url('./{{ scene_filename }}'); background-position: {{ scene.position }}; background-size: {{ scene.fit }};">
                <span class="scene-cap" data-text-id="slide-01.scene.caption">{{ scene.caption }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="{{ asset_path }}/feishu-deck.js"></script>
  <script src="{{ asset_path }}/edit-mode/deck-edit-mode.js" defer></script>
</body>
</html>
